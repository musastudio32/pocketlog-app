workflows:
  pocketlog-android:
    name: PocketLog Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Create Android platform files
        script: |
          flutter create . --org com.musastudio --project-name pocketlog --platforms android
      - name: Get packages
        script: |
          flutter pub get
      - name: Build release APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
